<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodyRat Terminal</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal-header { font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #00ff41; padding-bottom: 10px; }
        .typewriter { font-size: 18px; height: 30px; margin-bottom: 30px; }
        .cursor { display: inline-block; width: 10px; background: #00ff41; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn { padding: 15px 30px; border: 1px solid #00ff41; color: #00ff41; text-decoration: none; text-transform: uppercase; }
        .btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

    <div class="terminal-header">CodyRat</div>
    <div class="typewriter"><span id="text"></span><span class="cursor">&nbsp;</span></div>
    <a href="ссылка_на_файл" class="btn">Execute Download</a>

    <script>
        const texts = ["Ратник будущего", "Работает без портов", "Управление через телеграм"];
        let i = 0, j = 0, currentText = '', isDeleting = false;
        function type() {
            currentText = texts[i];
            document.getElementById('text').textContent = isDeleting ? currentText.substring(0, j--) : currentText.substring(0, j++);
            if (!isDeleting && j === currentText.length + 1) { setTimeout(() => isDeleting = true, 2000); }
            else if (isDeleting && j === 0) { isDeleting = false; i = (i + 1) % texts.length; }
            setTimeout(type, isDeleting ? 50 : 150);
        }
        type();
    </script>
</body>
</html>
