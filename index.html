<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodyRat</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        .ui { position: relative; z-index: 1; text-align: center; }
        .btn { padding: 20px 40px; border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.1); color: #00ff41; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #00ff41; color: #000; }
        .header { position: absolute; top: 20px; left: 20px; z-index: 1; }
    </style>
</head>
<body>
    <canvas id="grid"></canvas>
    <div class="header">CodyRat</div>
    <div class="ui">
        <button id="btn" class="btn">EXECUTE DOWNLOAD</button>
        <p>TG: @mynewdead</p>
    </div>

    <script>
        const canvas = document.getElementById('grid');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const points = [];
        const spacing = 50;
        for (let x = 0; x < canvas.width; x += spacing) {
            for (let y = 0; y < canvas.height; y += spacing) {
                points.push({x, y, active: Math.random() > 0.95});
            }
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#003300';
            points.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI * 2); ctx.fill();
                if(p.active) {
                    ctx.fillStyle = '#00ff41'; ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#003300';
                }
            });
            // Движение тока
            points.forEach(p => if(Math.random() > 0.99) p.active = !p.active);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
