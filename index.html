<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodyRat</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 0; }
        
        .header { position: absolute; top: 20px; left: 20px; z-index: 1; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #00ff41; }
        .ui { position: relative; z-index: 1; text-align: center; width: 100%; padding: 20px; }
        
        .btn { padding: 25px 40px; border: 2px solid #00ff41; background: rgba(0, 255, 65, 0.1); color: #00ff41; font-size: 20px; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 80%; max-width: 300px; }
        .btn:hover { background: #00ff41; color: #000; }
        
        .contact { margin-top: 30px; font-size: 16px; color: #008f11; }
    </style>
</head>
<body>
    <canvas id="grid"></canvas>
    
    <div class="header">CodyRat [v.99]</div>
    
    <div class="ui">
        <button id="btn" class="btn">EXECUTE DOWNLOAD</button>
        <div class="contact">TG: @mynewdead</div>
    </div>

    <script>
        const canvas = document.getElementById('grid');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const points = [];
        for (let x = 0; x < canvas.width; x += 40) {
            for (let y = 0; y < canvas.height; y += 40) {
                points.push({x, y, active: Math.random() > 0.95});
            }
        }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            points.forEach(p => {
                ctx.fillStyle = p.active ? '#00ff41' : '#003300';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.active ? 2 : 1, 0, Math.PI * 2); ctx.fill();
                if(Math.random() > 0.995) p.active = !p.active;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
